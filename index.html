<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stezka</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --forest:#223D33; --forest-deep:#182D25; --moss:#5C7F63; --sand:#ECE2CB;
  --paper:#FBF8F1; --ink:#23231D; --ink-soft:#5A5648; --amber:#D98A3D;
  --amber-deep:#B96F28; --sky:#6E93A0; --danger:#B5473A; --line:#D9CDAE;
}
*{box-sizing:border-box;}
html,body{margin:0; padding:0;}
body{
  font-family:'IBM Plex Sans', sans-serif; background:var(--sand); color:var(--ink);
  min-height:100vh; line-height:1.45;
}
h1,h2,h3{font-family:'Fraunces', serif; margin:0; color:var(--forest-deep);}
.wrap{max-width:920px; margin:0 auto; padding:28px 20px 60px;}
.topbar{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:22px; border-bottom:2px solid var(--forest); padding-bottom:14px;}
.topbar h1{font-size:28px; letter-spacing:0.3px;}
.topbar .tag{font-size:12.5px; color:var(--ink-soft); font-style:italic;}
.user-chip{display:flex; align-items:center; gap:10px; font-size:13.5px; color:var(--ink-soft);}
.user-chip b{color:var(--forest-deep); font-family:'IBM Plex Mono', monospace; font-size:13px;}
.btn-ghost{background:none; border:1px solid var(--ink-soft); color:var(--ink-soft); border-radius:5px; padding:5px 10px; font-size:12.5px; cursor:pointer; font-family:'IBM Plex Sans', sans-serif;}
.btn-ghost:hover{border-color:var(--danger); color:var(--danger);}

.auth-card{max-width:420px; margin:60px auto; background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:32px 30px; box-shadow:0 6px 24px rgba(34,61,51,0.08);}
.auth-card h1{font-size:26px; margin-bottom:4px;}
.auth-card .sub{font-size:13px; color:var(--ink-soft); margin-bottom:22px;}
.field{margin-bottom:14px;}
.field label{display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); margin-bottom:5px;}
.field input{width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:6px; font-size:14.5px; font-family:'IBM Plex Sans', sans-serif; background:#fff; color:var(--ink);}
.field input:focus{outline:2px solid var(--forest); outline-offset:1px;}
.btn-primary{width:100%; background:var(--forest); color:var(--paper); border:none; border-radius:6px; padding:11px; font-size:14.5px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; margin-top:6px;}
.btn-primary:hover{background:var(--forest-deep);}
.btn-primary:disabled{opacity:0.55; cursor:default;}
.switch-line{margin-top:16px; font-size:13px; text-align:center; color:var(--ink-soft);}
.switch-line a{color:var(--amber-deep); cursor:pointer; font-weight:600; text-decoration:none;}
.error-box{background:#F5E4E1; border:1px solid var(--danger); color:#7C2E24; border-radius:6px; padding:9px 12px; font-size:13px; margin-bottom:14px;}
.success-box{background:#E6EDE3; border:1px solid var(--moss); color:var(--forest-deep); border-radius:6px; padding:9px 12px; font-size:13px; margin-bottom:14px;}

.grid{display:grid; grid-template-columns:1.1fr 1fr; gap:20px;}
@media (max-width:720px){
  .wrap{padding:16px 12px 40px;}
  .grid{grid-template-columns:1fr; gap:14px;}
  .topbar{flex-wrap:wrap; gap:8px 14px; margin-bottom:16px;}
  .topbar h1{font-size:23px;}
  .user-chip{font-size:12.5px; flex-wrap:wrap;}
  .card{padding:16px 15px; margin-bottom:14px;}
  .auth-card{margin:24px auto; padding:24px 18px; max-width:none;}
  .entry-row{flex-direction:column; gap:0;}
  .entry-row .field{margin-bottom:14px;}
  .trail-total{font-size:23px;}
  .trail-stats{flex-wrap:wrap; gap:6px;}
  .trail-meta{flex-direction:column; align-items:flex-start; gap:6px;}
  .lb-row{grid-template-columns:20px 1fr 66px 58px; font-size:12.5px; gap:6px; padding:8px 2px;}
  .lb-row.cols3{grid-template-columns:20px 1fr 66px;}
  .month-history-row{grid-template-columns:1.1fr 1fr 50px; font-size:12px; gap:6px;}
  .goal-edit-form{flex-wrap:wrap;}
  .goal-edit-form input{width:120px;}
  .delete-actions{flex-direction:column; align-items:stretch;}
  .setup-card{margin:24px auto; padding:22px 18px;}
}
@media (max-width:400px){
  .topbar .tag{display:none;}
  .lb-row{grid-template-columns:18px 1fr 58px 52px; font-size:11.5px;}
  .lb-row.cols3{grid-template-columns:18px 1fr 58px;}
}
/* comfortable tap targets on touch devices */
.btn-primary, .btn-ghost, .btn-danger, .btn-danger-confirm, .goal-save, .goal-cancel{min-height:40px;}
input[type="date"], input[type="number"], input[type="text"], input[type="password"]{min-height:40px;}

.card h2{font-size:17px; margin-bottom:14px;}
.card h2 .eyebrow{display:block; font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.14em; color:var(--moss); text-transform:uppercase; margin-bottom:3px;}

.trail-wrap{padding:6px 2px 2px;}
.trail-stats{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:14px;}
.trail-total{font-family:'IBM Plex Mono', monospace; font-size:30px; font-weight:600; color:var(--forest-deep);}
.trail-total span{font-size:13px; font-weight:400; color:var(--ink-soft); font-family:'IBM Plex Sans', sans-serif;}
.trail-pct{font-family:'IBM Plex Mono', monospace; font-size:14px; color:var(--amber-deep); font-weight:600;}
.trail-meta{display:flex; justify-content:space-between; margin-top:10px; font-size:12.5px; color:var(--ink-soft);}

.status-pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11.5px; font-weight:600; font-family:'IBM Plex Sans', sans-serif;}
.status-ok{background:#E1EBDD; color:#33562F;}
.status-behind{background:#F3E4D6; color:var(--amber-deep);}
.status-done{background:var(--forest); color:var(--paper);}

.goal-line{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.goal-line .edit-link{color:var(--amber-deep); cursor:pointer; font-weight:600; text-decoration:none; margin-left:6px;}
.goal-edit-form{display:flex; gap:8px; align-items:center; margin-top:6px;}
.goal-edit-form input{width:150px; padding:6px 9px; border:1px solid var(--line); border-radius:6px; font-size:13.5px; font-family:'IBM Plex Mono', monospace; background:#fff; color:var(--ink);}
.goal-edit-form button{border:none; border-radius:6px; padding:6px 12px; font-size:12.5px; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; font-weight:600;}

.entry-row{display:flex; gap:10px;}

.history-list{margin-top:16px; max-height:220px; overflow-y:auto; border-top:1px solid var(--line);}
.history-row{display:flex; justify-content:space-between; align-items:center; padding:8px 2px; border-bottom:1px solid var(--line); font-size:13.5px;}
.history-row .d{font-family:'IBM Plex Mono', monospace; color:var(--ink-soft); font-size:12.5px;}

.history-row .del{background:none; border:none; color:var(--danger); cursor:pointer; font-size:16px; padding:0 4px;}

.lb-row{display:grid; grid-template-columns:26px 1fr 90px 68px; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px solid var(--line); font-size:13.5px;}

.lb-rank{font-family:'IBM Plex Mono', monospace; color:var(--ink-soft); font-size:12.5px;}
.lb-name{font-weight:600; color:var(--ink);}
.lb-steps{font-family:'IBM Plex Mono', monospace; text-align:right; color:var(--forest-deep);}

.lb-pct-col{display:flex; flex-direction:column; align-items:flex-end; line-height:1.2;}
.lb-pct-main{font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--amber-deep); font-weight:600;}
.lb-pct-sub{font-size:9.5px; color:var(--ink-soft); white-space:nowrap;}

.month-history-row{display:grid; grid-template-columns:1fr 1fr 70px; align-items:center; gap:10px; padding:8px 4px; border-bottom:1px solid var(--line); font-size:13.5px;}

.month-history-row .w{font-weight:600; color:var(--forest-deep);}
.month-history-row .p{font-family:'IBM Plex Mono', monospace; color:var(--amber-deep); text-align:right;}

.footnote{font-size:11.5px; color:var(--ink-soft); margin-top:6px; line-height:1.5;}
.loading-line{font-size:12.5px; color:var(--ink-soft); font-style:italic;}

.danger-card{border-color:var(--danger);}
.danger-card h2{color:var(--danger);}
.danger-card h2 .eyebrow{color:var(--danger);}
.danger-desc{font-size:13px; color:var(--ink-soft); margin-bottom:14px; max-width:520px;}
.btn-danger{background:none; border:1px solid var(--danger); color:var(--danger); border-radius:6px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans', sans-serif;}
.btn-danger:hover{background:var(--danger); color:var(--paper);}
.btn-danger:disabled{opacity:0.45; cursor:default;}
.btn-danger-confirm{background:var(--danger); border:none; color:var(--paper); border-radius:6px; padding:9px 16px; font-size:13.5px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans', sans-serif;}
.btn-danger-confirm:disabled{opacity:0.55; cursor:default;}
.delete-form .field{max-width:280px;}
.delete-actions{display:flex; gap:10px; align-items:center;}

.reward-form-row{display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;}
.reward-form-row .field{margin-bottom:0;}
.reward-form-row select{padding:9px 8px; border:1px solid var(--line); border-radius:6px; font-size:14px; font-family:'IBM Plex Sans', sans-serif; background:#fff; color:var(--ink);}
.reward-form-row input[type="text"]{min-width:180px;}
.reward-form-row button{white-space:nowrap;}
.reward-cat{margin-top:16px;}
.reward-cat:first-of-type{margin-top:18px;}
.reward-cat h3{font-size:13px; margin:0 0 4px; color:var(--forest-deep); font-family:'Fraunces', serif;}
.reward-row{display:flex; align-items:center; gap:8px; padding:7px 2px; border-bottom:1px solid var(--line); font-size:13px; cursor:pointer;}
.reward-row:hover{background:#F2ECD9;}
.reward-row.mine{background:#EFE7CE; border-radius:6px; padding:7px 8px; margin:0 -6px;}
.reward-radio{width:14px; text-align:center; color:var(--moss); font-size:13px; flex-shrink:0;}
.reward-text{flex:1;}
.reward-by{color:var(--ink-soft); font-size:11.5px;}
.reward-votes{font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft); min-width:20px; text-align:right; flex-shrink:0;}
.reward-row.top .reward-votes{color:var(--amber-deep); font-weight:700;}
.reward-empty{font-size:12.5px; color:var(--ink-soft); font-style:italic; padding:4px 0 8px;}

.setup-card{max-width:640px; margin:50px auto; background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:30px 34px;}
.setup-card h1{font-size:22px; margin-bottom:14px;}
.setup-card ol{padding-left:20px; font-size:14px; line-height:1.8;}
.setup-card code{background:var(--sand); padding:2px 6px; border-radius:4px; font-family:'IBM Plex Mono', monospace; font-size:13px;}
.setup-card pre{background:#1b1b17; color:#e8e2d0; padding:14px 16px; border-radius:8px; font-size:12.5px; overflow-x:auto; font-family:'IBM Plex Mono', monospace; line-height:1.6;}
.loading-screen{text-align:center; margin-top:120px; color:var(--ink-soft); font-style:italic;}
</style>

<body>
<div class="wrap"><div id="app"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, deleteUser, reauthenticateWithCredential,
  EmailAuthProvider, sendPasswordResetEmail, updateEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, deleteField,
  collection, getDocs, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =====================================================================
   1) Vlastní Firebase projekt založíte zdarma na https://console.firebase.google.com
   2) V projektu zapněte: Authentication -> Sign-in method -> Email/Password
   3) Založte Firestore Database (produkční režim, libovolný region)
   4) V Project settings -> Vaše aplikace -> Web app zkopírujte konfigurační
      objekt a vložte ho místo hodnot níže.
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyA3go0oluWm_kcdgtVS3TLHYr9bkS7ujfY",
  authDomain: "stezka-holek-ze-slatiny.firebaseapp.com",
  projectId: "stezka-holek-ze-slatiny",
  storageBucket: "stezka-holek-ze-slatiny.firebasestorage.app",
  messagingSenderId: "455636027570",
  appId: "1:455636027570:web:ce0e57a143d70c18ea61ab"
};

const NEEDS_SETUP = firebaseConfig.apiKey.startsWith('VLOZ_SEM');

let app, auth, db;
if (!NEEDS_SETUP){
  app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);
}

const DEFAULT_GOAL = 4000000;
const GOAL_DAYS = 365;
const EMAIL_DOMAIN = '@stezka-app.invalid';

/* Přístupový kód pro registraci — změňte na vlastní tajnou frázi a řekněte
   ji jen lidem, které chcete v appce mít. Není to dokonalé zabezpečení (kód
   je vidět ve zdrojovém kódu stránky), ale spolehlivě odradí boty a náhodné
   kolemjdoucí. Skutečné omezení "jen na tyto lidi" hlídá seznam allowlist
   (viz Firestore pravidla níže). */
const INVITE_CODE = "Brno27slatina";

const REWARD_CATEGORIES = ['25','50','75','100'];

const state = {
  view: 'loading',            // 'loading' | 'login' | 'register' | 'dashboard'
  authError: '', authLoading: false, authNotice: '',
  currentUser: null,          // {uid, username, registeredAt, goal, authEmail}
  stepsMap: {}, dateInput: todayStr(), message: '',
  leaderboard: [], lbLoading: false, saving: false,
  weeklyTop5: [], monthlyGoalTop5: [], monthlyHistory: [],
  editingGoal: false, goalInput: '', goalError: '',
  deletingAccount: false, deleteError: '', deleteBusy: false,
  showForgotPassword: false, forgotNotice: '', forgotError: '', forgotBusy: false,
  editingEmail: false, emailInput: '', emailError: '', emailBusy: false,
  rewardProposals: [], rewardVotes: [], rewardLoading: false,
  rewardCategoryInput: '25', rewardTextInput: '', rewardError: '',
};

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmt(n){ return Number(n||0).toLocaleString('cs-CZ'); }
function fmtGoalThousands(goal){ return fmt(Math.round((goal||0)/1000)) + ' tis.'; }
function toEmail(username){ return username.toLowerCase()+EMAIL_DOMAIN; }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }
function daysBetween(a,b){ return Math.floor((b.getTime()-a.getTime())/86400000); }
function isValidEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s); }

async function resolveLoginEmail(username){
  try{
    const snap = await getDoc(doc(db,'emailLookup', username.toLowerCase()));
    if (snap.exists() && snap.data().email) return snap.data().email;
  }catch(e){ /* fall through to legacy scheme */ }
  return toEmail(username);
}

function isoWeekRange(d){
  const day = (d.getDay()+6)%7; // Monday = 0
  const monday = new Date(d); monday.setHours(0,0,0,0); monday.setDate(d.getDate()-day);
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6); sunday.setHours(23,59,59,999);
  return {start: monday, end: sunday};
}
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function monthLabelCz(y,m){
  const names=['leden','únor','březen','duben','květen','červen','červenec','srpen','září','říjen','listopad','prosinec'];
  return names[m]+' '+y;
}
function stepsInRange(stepsMap, start, end){
  let total=0;
  for (const [dateStr, steps] of Object.entries(stepsMap||{})){
    const d = new Date(dateStr+'T12:00:00');
    if (d>=start && d<=end) total += Number(steps||0);
  }
  return total;
}
function stepsInMonth(stepsMap, y, m){
  let total=0;
  for (const [dateStr, steps] of Object.entries(stepsMap||{})){
    const d = new Date(dateStr+'T12:00:00');
    if (d.getFullYear()===y && d.getMonth()===m) total += Number(steps||0);
  }
  return total;
}
function lastEntryDate(stepsMap){
  const keys = Object.keys(stepsMap||{});
  if (!keys.length) return null;
  return keys.sort().slice(-1)[0];
}
function formatRelativeDateCz(dateStr){
  if (!dateStr) return '';
  if (dateStr === todayStr()) return 'dnes';
  const y = new Date(); y.setDate(y.getDate()-1);
  const yStr = y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
  if (dateStr === yStr) return 'včera';
  const [, m, d] = dateStr.split('-').map(Number);
  return d+'. '+m+'.';
}
function computeWeeklyTop5(rows){
  const {start,end} = isoWeekRange(new Date());
  const scored = rows.map(r=>({uid:r.uid, username:r.username, total: stepsInRange(r.stepsMap, start, end), lastDate: lastEntryDate(r.stepsMap)}));
  scored.sort((a,b)=>b.total-a.total);
  return scored.slice(0,5);
}
function computeMonthlyGoalTop5(rows){
  const now = new Date(); const y=now.getFullYear(), m=now.getMonth();
  const dim = daysInMonth(y,m);
  const scored = rows.map(r=>{
    const total = stepsInMonth(r.stepsMap, y, m);
    const goal = r.goal || DEFAULT_GOAL;
    const target = goal/365*dim;
    const pct = target>0 ? (total/target*100) : 0;
    return {uid:r.uid, username:r.username, total, pct, goal};
  });
  scored.sort((a,b)=>b.pct-a.pct);
  return scored.slice(0,5);
}
function computeMonthlyHistory(rows){
  const monthsSet = new Set();
  rows.forEach(r=>{
    Object.keys(r.stepsMap||{}).forEach(dateStr=>{
      const d = new Date(dateStr+'T12:00:00');
      monthsSet.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
    });
  });
  const months = Array.from(monthsSet).sort();
  return months.map(mk=>{
    const [yy,mm] = mk.split('-').map(Number);
    const y=yy, m=mm-1;
    const dim = daysInMonth(y,m);
    let bestPct = -1; let winners = [];
    rows.forEach(r=>{
      const total = stepsInMonth(r.stepsMap, y, m);
      const goal = r.goal || DEFAULT_GOAL;
      const target = goal/365*dim;
      const pct = target>0 ? (total/target*100) : 0;
      if (pct > bestPct + 1e-9){ bestPct = pct; winners = [r.username]; }
      else if (Math.abs(pct-bestPct) < 1e-9){ winners.push(r.username); }
    });
    return {label: monthLabelCz(y,m), winners, pct: bestPct};
  });
}

function firebaseErrorMessage(err){
  const code = err && err.code ? err.code : '';
  if (code==='auth/email-already-in-use') return 'Toto uživatelské jméno už je zabrané.';
  if (code==='auth/weak-password') return 'Heslo musí mít alespoň 6 znaků.';
  if (code==='auth/invalid-credential' || code==='auth/wrong-password' || code==='auth/user-not-found') return 'Nesprávné jméno nebo heslo.';
  if (code==='auth/too-many-requests') return 'Příliš mnoho pokusů, zkuste to prosím za chvíli.';
  if (code==='auth/network-request-failed') return 'Nepodařilo se spojit se serverem, zkontrolujte připojení.';
  return 'Něco se nepovedlo (' + (code||'neznámá chyba') + ').';
}

function computeProgress(registeredAt, total, goal){
  goal = goal || DEFAULT_GOAL;
  const reg = new Date(registeredAt);
  const now = new Date();
  const elapsed = Math.max(0, daysBetween(reg, now));
  const daysLeft = Math.max(0, GOAL_DAYS - elapsed);
  const pct = Math.min(100, (total/goal)*100);
  const expectedByNow = Math.min(goal, (elapsed/GOAL_DAYS)*goal);
  let status = 'behind';
  if (total >= goal) status = 'done';
  else if (total >= expectedByNow) status = 'ok';
  const remaining = Math.max(0, goal-total);
  const perDayNeeded = daysLeft>0 ? Math.ceil(remaining/daysLeft) : (remaining>0?Infinity:0);
  return {elapsed, daysLeft, pct, status, remaining, perDayNeeded};
}

function trailSvg(total, goal){
  goal = goal || DEFAULT_GOAL;
  const scaleMax = total > goal ? total*1.05 : goal;
  const markers = [
    {v: goal*0.25, label:'25 %'}, {v: goal*0.5, label:'50 %'},
    {v: goal*0.75, label:'75 %'}, {v: goal, label:'CÍL', isGoal:true},
  ];
  const width=640, padX=20, usableW=width-padX*2;
  const posOf = v => padX + (v/scaleMax)*usableW;
  const posNow = posOf(Math.min(total, scaleMax));
  const markerSvg = markers.map(m=>{
    const x = posOf(m.v); const isGoal = !!m.isGoal;
    return `
      <line x1="${x}" y1="34" x2="${x}" y2="${isGoal?18:24}" stroke="${isGoal?'var(--amber-deep)':'var(--moss)'}" stroke-width="${isGoal?2.5:1.5}"/>
      <text x="${x}" y="${isGoal?12:16}" font-size="${isGoal?10.5:9}" fill="${isGoal?'#B96F28':'#5A5648'}" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-weight="${isGoal?700:500}">${m.label}</text>
    `;
  }).join('');
  return `
    <svg viewBox="0 0 ${width} 60" width="100%" style="height:auto; display:block;" xmlns="http://www.w3.org/2000/svg">
      <line x1="${padX}" y1="34" x2="${width-padX}" y2="34" stroke="var(--line)" stroke-width="3" stroke-linecap="round"/>
      <line x1="${padX}" y1="34" x2="${posNow}" y2="34" stroke="var(--forest)" stroke-width="3" stroke-linecap="round"/>
      ${markerSvg}
      <circle cx="${posNow}" cy="34" r="7" fill="var(--amber-deep)" stroke="var(--paper)" stroke-width="2"/>
      <text x="${posNow}" y="52" font-size="14" text-anchor="middle">👣</text>
    </svg>
  `;
}

function render(){
  const app_ = document.getElementById('app');
  if (state.view==='loading') app_.innerHTML = `<div class="loading-screen">Načítám…</div>`;
  else if (state.view==='login' || state.view==='register') app_.innerHTML = authTemplate();
  else app_.innerHTML = dashboardTemplate();
}

function setupTemplate(){
  return `
    <div class="setup-card">
      <h1>Stezka — potřeba dokončit nastavení</h1>
      <div class="danger-desc">Aplikace používá Firebase jako cloudové úložiště. Než ji poprvé spustíte, je potřeba propojit ji s vaším vlastním (zdarma založeným) Firebase projektem.</div>
      <ol>
        <li>Založte projekt na <code>console.firebase.google.com</code></li>
        <li>V sekci <code>Authentication → Sign-in method</code> zapněte <code>Email/Password</code></li>
        <li>V sekci <code>Firestore Database</code> vytvořte databázi (produkční režim)</li>
        <li>V <code>Project settings → Vaše aplikace → Web app</code> zkopírujte konfigurační objekt</li>
        <li>Vložte ho do souboru <code>stezka-firebase.html</code> místo hodnot <code>VLOZ_SEM_...</code></li>
        <li>Ve Firestore vytvořte kolekci <code>allowlist</code> a pro každého schváleného uživatele přidejte dokument, jehož ID je jeho uživatelské jméno malými písmeny (obsah dokumentu může být prázdný)</li>
        <li>V Firestore přidejte tato pravidla (záložka <code>Rules</code>):</li>
      </ol>
      <pre>rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /allowlist/{username} {
      allow read: if request.auth != null;
      allow write: if false;
    }
    match /emailLookup/{username} {
      allow read: if true;
      allow write: if request.auth != null && request.resource.data.uid == request.auth.uid;
    }
    match /users/{uid} {
      allow read: if request.auth != null;
      allow create: if request.auth != null && request.auth.uid == uid
                    && exists(/databases/$(database)/documents/allowlist/$(request.resource.data.username));
      allow update, delete: if request.auth != null && request.auth.uid == uid;
    }
    match /steps/{uid} {
      allow read: if request.auth != null;
      allow write: if request.auth != null && request.auth.uid == uid;
    }
    match /rewardProposals/{proposalId} {
      allow read: if request.auth != null;
      allow create: if request.auth != null && request.resource.data.uid == request.auth.uid;
      allow update, delete: if false;
    }
    match /rewardVotes/{voteId} {
      allow read: if request.auth != null;
      allow write: if request.auth != null && request.resource.data.uid == request.auth.uid
                   && voteId == request.auth.uid + '_' + request.resource.data.category;
    }
  }
}</pre>
      <div class="danger-desc">Soubor pak uložte a znovu otevřete v prohlížeči.</div>
    </div>
  `;
}

async function handleAuthSubmit(form){
  const username = (form.username.value||'').trim();
  const password = form.password.value||'';
  state.authError=''; state.authNotice='';

  if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)){
    state.authError = 'Jméno smí mít 3–20 znaků: písmena, čísla, podtržítko.'; render(); return;
  }
  if (password.length < 6){
    state.authError = 'Heslo musí mít alespoň 6 znaků.'; render(); return;
  }

  if (state.view==='register'){
    const confirm = form.confirm ? form.confirm.value : '';
    if (password !== confirm){ state.authError = 'Hesla se neshodují.'; render(); return; }
    const realEmail = (form.email ? form.email.value : '').trim();
    if (!isValidEmail(realEmail)){ state.authError = 'Zadejte platnou e-mailovou adresu (potřebujeme ji jen pro obnovu hesla).'; render(); return; }
    const inviteRaw = form.invite ? form.invite.value : '';
    if (inviteRaw !== INVITE_CODE){ state.authError = 'Nesprávný přístupový kód.'; render(); return; }
    let goal = DEFAULT_GOAL;
    const goalRaw = form.goal ? form.goal.value : '';
    if (goalRaw){
      const parsedGoal = parseInt(goalRaw, 10);
      if (isNaN(parsedGoal) || parsedGoal < 1){ state.authError = 'Cíl musí být kladné celé číslo kroků.'; render(); return; }
      goal = parsedGoal;
    }
    state.authLoading = true; render();
    let cred;
    try{
      cred = await createUserWithEmailAndPassword(auth, realEmail, password);
    }catch(err){
      state.authLoading = false;
      state.authError = firebaseErrorMessage(err);
      render(); return;
    }
    try{
      const uid = cred.user.uid;
      const registeredAt = new Date().toISOString();
      await setDoc(doc(db,'users',uid), {username: username.toLowerCase(), goal, registeredAt});
      await setDoc(doc(db,'steps',uid), {});
      await setDoc(doc(db,'emailLookup',username.toLowerCase()), {email: realEmail, uid});
      state.authLoading = false;
      // onAuthStateChanged will pick this up and enter the dashboard
    }catch(writeErr){
      // Firestore rules rejected this — the username isn't on the approved allowlist.
      // Roll back the just-created auth account so it doesn't linger unusable.
      await deleteUser(cred.user).catch(()=>{});
      await signOut(auth).catch(()=>{});
      state.authLoading = false;
      state.authError = 'Toto uživatelské jméno není na seznamu schválených uživatelů. Ozvěte se prosím správci appky.';
      render();
    }
  } else {
    state.authLoading = true; render();
    try{
      const email = await resolveLoginEmail(username);
      await signInWithEmailAndPassword(auth, email, password);
      state.authLoading = false;
      // onAuthStateChanged will pick this up and enter the dashboard
    }catch(err){
      state.authLoading = false;
      state.authError = firebaseErrorMessage(err);
      render();
    }
  }
}

async function handleForgotPassword(form){
  const username = (form.username.value||'').trim();
  state.forgotError=''; state.forgotNotice='';
  if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)){
    state.forgotError = 'Zadejte platné uživatelské jméno.'; render(); return;
  }
  state.forgotBusy = true; render();
  try{
    const email = await resolveLoginEmail(username);
    await sendPasswordResetEmail(auth, email);
  }catch(err){
    // swallow errors here on purpose — we don't want to reveal whether a
    // username exists to whoever is using this form
  }
  state.forgotBusy = false;
  state.forgotNotice = 'Pokud má toto jméno u účtu uložený e-mail, poslali jsme na něj odkaz pro nastavení nového hesla. Zkontrolujte i složku Spam.';
  render();
}

async function loadUserAndEnter(fbUser){
  try{
    const snap = await getDoc(doc(db,'users',fbUser.uid));
    if (!snap.exists()){
      state.authError = 'Profil nebyl nalezen, zkuste se přihlásit znovu.';
      state.view = 'login'; render(); return;
    }
    const data = snap.data();
    const stepsSnap = await getDoc(doc(db,'steps',fbUser.uid));
    const stepsMap = stepsSnap.exists() ? stepsSnap.data() : {};
    state.currentUser = {uid: fbUser.uid, username: data.username, registeredAt: data.registeredAt, goal: data.goal || DEFAULT_GOAL, authEmail: fbUser.email || ''};
    state.stepsMap = stepsMap;
    state.dateInput = todayStr();
    state.message = ''; state.editingGoal = false; state.goalError = '';
    state.view = 'dashboard';
    render();
    loadLeaderboard();
    loadRewards();
  }catch(err){
    state.authError = firebaseErrorMessage(err);
    state.view = 'login'; render();
  }
}

async function loadLeaderboard(){
  state.lbLoading = true;
  try{
    const usersSnap = await getDocs(collection(db,'users'));
    const rows = [];
    for (const docSnap of usersSnap.docs){
      const uid = docSnap.id;
      const data = docSnap.data();
      const stepsSnap = await getDoc(doc(db,'steps',uid));
      const smap = stepsSnap.exists() ? stepsSnap.data() : {};
      const total = Object.values(smap).reduce((a,b)=>a+Number(b||0),0);
      rows.push({uid, username: data.username, total, goal: data.goal || DEFAULT_GOAL, stepsMap: smap});
    }
    const overall = [...rows].sort((a,b)=>b.total-a.total);
    state.leaderboard = overall;
    state.weeklyTop5 = computeWeeklyTop5(rows);
    state.monthlyGoalTop5 = computeMonthlyGoalTop5(rows);
    state.monthlyHistory = computeMonthlyHistory(rows);
  }catch(err){
    // leaderboard failures are non-fatal, just leave the lists empty
  }
  state.lbLoading = false;
  if (state.view==='dashboard') render();
}

async function loadRewards(){
  state.rewardLoading = true;
  try{
    const [proposalsSnap, votesSnap] = await Promise.all([
      getDocs(collection(db,'rewardProposals')),
      getDocs(collection(db,'rewardVotes')),
    ]);
    state.rewardProposals = proposalsSnap.docs.map(d=>({id: d.id, ...d.data()}));
    state.rewardVotes = votesSnap.docs.map(d=>({id: d.id, ...d.data()}));
  }catch(err){
    // non-fatal — leave whatever we already had
  }
  state.rewardLoading = false;
  if (state.view==='dashboard') render();
}

async function handleRewardProposalSubmit(form){
  const category = form.category.value;
  const text = (form.text.value||'').trim();
  state.rewardError = '';
  if (!REWARD_CATEGORIES.includes(category)){ state.rewardError = 'Vyberte prosím kategorii.'; render(); return; }
  if (!text){ state.rewardError = 'Napište návrh odměny.'; render(); return; }
  state.rewardCategoryInput = category;
  try{
    await addDoc(collection(db,'rewardProposals'), {
      category, text, proposedBy: state.currentUser.username, uid: state.currentUser.uid,
      createdAt: new Date().toISOString(),
    });
    state.rewardTextInput = '';
    loadRewards();
  }catch(err){
    state.rewardError = firebaseErrorMessage(err);
    render();
  }
}

async function handleVote(category, proposalId){
  const voteId = state.currentUser.uid + '_' + category;
  try{
    await setDoc(doc(db,'rewardVotes', voteId), {
      category, proposalId, uid: state.currentUser.uid, username: state.currentUser.username,
      updatedAt: new Date().toISOString(),
    });
    loadRewards();
  }catch(err){
    // non-fatal, just leave the previous vote state visible
  }
}


  const date = form.date.value;
  const stepsVal = form.steps.value;
  if (!date || date > todayStr()) return;
  const steps = parseInt(stepsVal, 10);
  if (isNaN(steps) || steps < 0) return;

  state.saving = true; render();
  try{
    await setDoc(doc(db,'steps',state.currentUser.uid), {[date]: steps}, {merge:true});
    state.stepsMap = {...state.stepsMap, [date]: steps};
    state.message = `Uloženo: ${date} — ${fmt(steps)} kroků.`;
  }catch(err){
    state.message = '';
    state.authError = firebaseErrorMessage(err);
  }
  state.saving = false;
  render();
  loadLeaderboard();
}

async function deleteEntry(date){
  try{
    await updateDoc(doc(db,'steps',state.currentUser.uid), {[date]: deleteField()});
    const newMap = {...state.stepsMap};
    delete newMap[date];
    state.stepsMap = newMap;
    state.message = `Záznam pro ${date} smazán.`;
    render();
    loadLeaderboard();
  }catch(err){ /* ignore */ }
}

async function handleGoalSubmit(form){
  const parsedGoal = parseInt(form.goal.value, 10);
  if (isNaN(parsedGoal) || parsedGoal < 1){ state.goalError = 'Cíl musí být kladné celé číslo kroků.'; render(); return; }
  state.goalError = '';
  try{
    await updateDoc(doc(db,'users',state.currentUser.uid), {goal: parsedGoal});
    state.currentUser.goal = parsedGoal;
    state.editingGoal = false;
    state.message = `Cíl nastaven na ${fmt(parsedGoal)} kroků.`;
    render();
    loadLeaderboard();
  }catch(err){
    state.goalError = firebaseErrorMessage(err);
    render();
  }
}

async function handleEmailSubmit(form){
  const newEmail = (form.email.value||'').trim();
  if (!isValidEmail(newEmail)){ state.emailError = 'Zadejte platnou e-mailovou adresu.'; render(); return; }
  state.emailError = ''; state.emailBusy = true; render();
  try{
    await updateEmail(auth.currentUser, newEmail);
    await setDoc(doc(db,'emailLookup', state.currentUser.username), {email: newEmail, uid: state.currentUser.uid});
    state.currentUser.authEmail = newEmail;
    state.editingEmail = false;
    state.emailBusy = false;
    state.message = 'E-mail pro obnovu hesla byl uložen.';
    render();
  }catch(err){
    state.emailBusy = false;
    if (err && err.code === 'auth/requires-recent-login'){
      state.emailError = 'Z bezpečnostních důvodů se prosím odhlaste, znovu přihlaste a zkuste to hned poté.';
    } else {
      state.emailError = firebaseErrorMessage(err);
    }
    render();
  }
}

async function handleDeleteAccountSubmit(form){
  const password = form.password.value||'';
  state.deleteError = '';
  const fbUser = auth.currentUser;
  try{
    const cred = EmailAuthProvider.credential(fbUser.email, password);
    await reauthenticateWithCredential(fbUser, cred);
  }catch(err){
    state.deleteError = 'Nesprávné heslo.'; render(); return;
  }
  state.deleteBusy = true; render();
  try{
    await deleteDoc(doc(db,'users',fbUser.uid));
    await deleteDoc(doc(db,'steps',fbUser.uid));
    await deleteUser(fbUser);
    state.authNotice = 'Účet byl zrušen a všechna data byla smazána.';
    // onAuthStateChanged will move us back to the login view
  }catch(err){
    state.deleteBusy = false;
    state.deleteError = firebaseErrorMessage(err);
    render();
  }
}

function logout(){ signOut(auth); }

// ---- boot ----

if (NEEDS_SETUP){
  document.getElementById('app').innerHTML = setupTemplate();
} else {
  render();

  onAuthStateChanged(auth, (fbUser) => {
    if (fbUser){
      if (state.view !== 'dashboard') loadUserAndEnter(fbUser);
    } else {
      state.currentUser = null; state.stepsMap = {}; state.leaderboard = [];
      state.weeklyTop5 = []; state.monthlyGoalTop5 = []; state.monthlyHistory = [];
      state.deletingAccount = false; state.deleteError = ''; state.deleteBusy = false;
      state.editingEmail = false; state.emailError = ''; state.showForgotPassword = false;
      state.rewardProposals = []; state.rewardVotes = []; state.rewardError = '';
      state.view = state.view==='register' ? 'register' : 'login';
      render();
    }
  });

  const appEl = document.getElementById('app');

  appEl.addEventListener('submit', function(e){
    e.preventDefault();
    const formName = e.target.getAttribute('data-form');
    if (formName==='auth') handleAuthSubmit(e.target);
    if (formName==='entry') handleEntrySubmit(e.target);
    if (formName==='goal') handleGoalSubmit(e.target);
    if (formName==='email') handleEmailSubmit(e.target);
    if (formName==='delete-account') handleDeleteAccountSubmit(e.target);
    if (formName==='forgot') handleForgotPassword(e.target);
    if (formName==='reward-proposal') handleRewardProposalSubmit(e.target);
  });

  appEl.addEventListener('click', function(e){
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.getAttribute('data-action');
    if (action==='switch-register'){ state.view='register'; state.authError=''; state.authNotice=''; render(); }
    if (action==='switch-login'){ state.view='login'; state.authError=''; state.authNotice=''; render(); }
    if (action==='logout'){ logout(); }
    if (action==='delete-entry'){ deleteEntry(el.getAttribute('data-date')); }
    if (action==='edit-goal'){ state.editingGoal=true; state.goalInput=String(state.currentUser.goal||DEFAULT_GOAL); state.goalError=''; render(); }
    if (action==='cancel-goal'){ state.editingGoal=false; state.goalError=''; render(); }
    if (action==='edit-email'){ state.editingEmail=true; state.emailInput=(state.currentUser.authEmail&&!state.currentUser.authEmail.endsWith(EMAIL_DOMAIN))?state.currentUser.authEmail:''; state.emailError=''; render(); }
    if (action==='cancel-email'){ state.editingEmail=false; state.emailError=''; render(); }
    if (action==='open-delete-account'){ state.deletingAccount=true; state.deleteError=''; render(); }
    if (action==='cancel-delete-account'){ state.deletingAccount=false; state.deleteError=''; render(); }
    if (action==='open-forgot'){ state.showForgotPassword=true; state.forgotNotice=''; state.forgotError=''; render(); }
    if (action==='close-forgot'){ state.showForgotPassword=false; render(); }
    if (action==='vote'){ handleVote(el.getAttribute('data-category'), el.getAttribute('data-proposal')); }
  });

  appEl.addEventListener('change', function(e){
    if (e.target.matches('[data-action="date-change"]')){ state.dateInput = e.target.value; render(); }
  });
}
</script>
